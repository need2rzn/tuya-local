name: Validate with HACS

"on":
  push:
  pull_request:

jobs:
  validate:
    if: github.repository == 'make-all/tuya-local'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: wheels
