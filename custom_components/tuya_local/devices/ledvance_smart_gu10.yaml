name: Bulb
products:
  - id: key8u54q9dtru5jw
    manufacturer: Ledvance
    model: Ledvance Smart+ GU10

entities:
  - entity: light
    dps:
      - id: 20
        type: boolean
        name: switch

      - id: 21
        type: string
        name: color_mode
        mapping:
          - dps_val: white
            value: color_temp
          - dps_val: colour
            value: hs
          - dps_val: scene
            value: scene

      - id: 22
        type: integer
        name: brightness
        range:
          min: 10
          max: 1000

      - id: 23
        type: integer
        name: color_temp
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 2700
              max: 6500

      - id: 24
        type: hex
        name: hs_color

  - entity: text
    translation_key: scene
    category: config
    hidden: true
    dps:
      - id: 25
        type: hex
        name: value

  - entity: time
    name: Timer
    translation_key: timer
    category: config
    dps:
      - id: 26
        type: integer
        name: second
        range:
          min: 0
          max: 86399

  - entity: switch
    name: WiFi-Fernbedienung
    category: config
    dps:
      - id: 41
        type: boolean
        name: switch